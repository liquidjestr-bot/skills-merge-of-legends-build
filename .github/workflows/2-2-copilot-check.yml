name: 2-2 Copilot Check

concurrency:
  group: 2-2-copilot-check-${{ github.event.issue.number }}
  cancel-in-progress: true

on:
  issue_comment:
    types: [edited]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.state == 'open' && !endsWith(github.actor, '[bot]') }}
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      REPO_IMAGE_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.event.repository.default_branch }}/.github/images

    outputs:
      all_passed: ${{ steps.verify-checks.outputs.all_passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get diagram comment
        id: get-diagram
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body-includes: "Restore the SDLC Flow"
          direction: last

      - name: Check diagram
        id: check-diagram
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { checkSdlcDiagram, findMissingConnections, extractMermaidBlock, parseConnections } = require("./.github/workflows/check-copilot-mermaid");
            const { removeAlerts } = require("./.github/workflows/actions-utils");

            let commentBody = process.env.COMMENT_BODY;

            // If no comment found, end early
            if (!commentBody) {
              core.setFailed('Diagram comment not found yet.');
              return;
            }

            const is_correct = checkSdlcDiagram(commentBody);

            // Remove any existing alerts before adding new feedback
            commentBody = removeAlerts(commentBody);

            if (is_correct) {
              core.info('SDLC diagram is correct!');
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(process.env.COMMENT_ID),
                body: commentBody + `\n\n> [!TIP]\n> ✅ The SDLC flow is correct! Well done. :copilot:\n`
              });
            } else {
              const mermaidBlock = extractMermaidBlock(commentBody);
              const connections = mermaidBlock ? parseConnections(mermaidBlock) : [];
              const missing = findMissingConnections(connections);
              const missingList = missing.map(([f, t]) => `\`${f} --> ${t}\``).join(", ");
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(process.env.COMMENT_ID),
                body: commentBody + `\n\n> [!Caution]\n> ❌ Not quite yet. Missing connections: ${missingList}\n`
              });
              core.setFailed('SDLC diagram is not correct. Please fix the connections.');
            }

        env:
          COMMENT_ID: ${{ steps.get-diagram.outputs.comment-id }}
          COMMENT_BODY: ${{ steps.get-diagram.outputs.comment-body }}

      - name: Verify all checks passed
        id: verify-checks
        uses: actions/github-script@v7
        env:
          steps_outcomes: ${{ toJson(steps.*.outcome) }}
        with:
          script: |
            // Log all step outcomes for debugging
            core.info(`Steps outcomes: ${process.env.steps_outcomes}`);

            // Check if any step has 'failure' outcome
            const allPassed = !process.env.steps_outcomes.includes('failure');
            core.setOutput('all_passed', allPassed.toString());

            // Log result
            if (allPassed) {
              core.info('All checks passed.');
            } else {
              core.info('Some checks failed. Please review the comments for details.');
            }

  finish_challenge:
    name: Finish challenge
    needs: check_step_work
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.state == 'open' && needs.check_step_work.outputs.all_passed == 'true' }}
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      REPO_IMAGE_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.event.repository.default_branch }}/.github/images
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build comment - show tip
        id: build-tip
        uses: ./.github/actions/render-markdown-template
        with:
          template-file: .github/steps/2-6-copilot-tip.md
          repo-image-base-url: ${{ env.REPO_IMAGE_BASE_URL }}

      - name: Add comment - show tip
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body: ${{ steps.build-tip.outputs.rendered-text }}

      - name: Build comment - finalize quest
        id: build-finish
        uses: ./.github/actions/render-markdown-template
        with:
          template-file: .github/steps/2-5-copilot-finish.md
          repo-image-base-url: ${{ env.REPO_IMAGE_BASE_URL }}

      - name: Add comment - finalize quest
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body: ${{ steps.build-finish.outputs.rendered-text }}

      - name: Close the issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              state: 'closed'
            });
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}

      - name: Disable current workflow
        run: |
          gh workflow disable "2-2 Copilot Check" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  handoff_to_start:
    name: Open next quest
    needs: finish_challenge
    if: ${{ needs.finish_challenge.result == 'success' }}
    uses: ./.github/workflows/0-0-start.yml
    with:
      closed-issue-number: ${{ github.event.issue.number }}
    secrets: inherit
